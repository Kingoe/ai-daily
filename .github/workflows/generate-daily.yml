name: Generate AI Daily

on:
  schedule:
    # 每天早上 8 点 UTC 时间（北京时间 16 点）
    - cron: '0 8 * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  generate-daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install -g @anthropic-ai/claude-code

      - name: Generate AI Daily
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude "帮我运行今天的 AI 日报流水线"

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff --staged --quiet || git commit -m "chore: generate AI daily for $(date +%Y-%m-%d)"
          git push

      - name: Deploy to server (可选)
        if: ${{ secrets.SERVER_SSH_KEY }}
        uses: easingthemes/ssh-deploy@v2.1.1
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: root
          SOURCE: docs/
          TARGET: /var/www/ai-daily/docs
